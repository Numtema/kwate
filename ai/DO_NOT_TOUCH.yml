rules:
  - "Do not introduce MockProvider, useMock, MOCK_* or hardcoded business records"
  - "Do not expose server secrets with NEXT_PUBLIC_*"
  - "Do not bypass RLS with admin credentials for normal user actions"
  - "Do not hard-delete posts"
  - "Do not grant entitlements from a success page"
  - "Do not run remote provisioning without explicit confirmation"
protected_paths:
  - "insforge/migrations/**"
  - "insforge/rls/**"
  - "app/api/webhooks/stripe/route.ts"
  - "lib/insforge/admin-client.ts"
